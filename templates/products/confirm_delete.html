{% extends "base.html" %}
{% block title %}Delete {{ product.name }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card border-danger border-0 shadow-sm">
            <div class="card-body text-center p-5">
                <i class="bi bi-trash text-danger" style="font-size:3rem;"></i>
                <h5 class="fw-bold mt-3">Delete Product?</h5>
                <p class="text-muted">
                    Are you sure you want to delete<br>
                    <strong>{{ product.brand }} {{ product.name }}</strong>?
                    <br><small>This will also delete all movement history for this product.</small>
                </p>
                <div class="d-flex gap-2 justify-content-center mt-4">
                    <form method="post">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-danger btn-lg px-4">
                            <i class="bi bi-trash"></i> Yes, Delete
                        </button>
                    </form>
                    <a href="{% url 'product_detail' product.pk %}" class="btn btn-outline-secondary btn-lg px-4">Cancel</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
