{% extends "base.html" %}
{% block title %}{{ title }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="card border-0 shadow-sm">
            <div class="card-header bg-dark text-white py-3 px-4">
                <h5 class="fw-bold mb-0">
                    <i class="bi bi-pencil me-2 text-warning"></i>{{ title }}
                </h5>
            </div>
            <div class="card-body p-4">
                <form method="post">
                    {% csrf_token %}
                    <div class="row g-3">
                        <div class="col-md-4">
                            <label class="form-label fw-semibold">Wall Name <span class="text-danger">*</span></label>
                            {{ form.name }}
                            {% if form.name.errors %}<div class="text-danger small">{{ form.name.errors }}</div>{% endif %}
                        </div>
                        <div class="col-md-8">
                            <label class="form-label fw-semibold">Category</label>
                            {{ form.category }}
                        </div>
                        <div class="col-12">
                            <label class="form-label fw-semibold">Description</label>
                            {{ form.description }}
                        </div>
                    </div>
                    <hr class="my-4">
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary btn-lg px-5">
                            <i class="bi bi-check-lg"></i> Save Changes
                        </button>
                        <a href="{% url 'wall_list' %}" class="btn btn-outline-secondary btn-lg px-4">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
