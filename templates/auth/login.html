<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — RackFinder</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body { background: #1a1a2e; }
        .login-card {
            max-width: 420px;
            margin: 80px auto;
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 8px 40px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>
<div class="login-card p-5">
    <div class="text-center mb-4">
        <i class="bi bi-grid-3x3-gap-fill text-warning" style="font-size:2.5rem;"></i>
        <h2 class="fw-bold mt-2">RackFinder</h2>
        <p class="text-muted">Cosmetic Shop Locator</p>
    </div>

    {% if form.errors %}
    <div class="alert alert-danger">Invalid username or password.</div>
    {% endif %}

    <form method="post">
        {% csrf_token %}
        <div class="mb-3">
            <label class="form-label fw-semibold">Username</label>
            <input type="text" name="username" class="form-control form-control-lg"
                   autofocus autocomplete="username" placeholder="Enter username">
        </div>
        <div class="mb-4">
            <label class="form-label fw-semibold">Password</label>
            <input type="password" name="password" class="form-control form-control-lg"
                   autocomplete="current-password" placeholder="Enter password">
        </div>
        <input type="hidden" name="next" value="{{ next }}">
        <button type="submit" class="btn btn-warning btn-lg w-100 fw-bold">
            <i class="bi bi-box-arrow-in-right"></i> Sign In
        </button>
    </form>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
